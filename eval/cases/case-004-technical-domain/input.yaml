prompt: >
  FinanceFirst (our largest financial services customer, $1.2M ARR) needs to
  run model training jobs on air-gapped clusters with no internet access.
  Their security policy prohibits any outbound network calls from training
  environments. Today RHOAI's pipeline system tries to pull container images
  and Python packages from external registries during training job setup,
  which fails in their environment and forces them to use a separate
  non-RHOAI workflow. They want to be able to pre-stage all dependencies
  and run training entirely offline. This is also relevant to three other
  customers in regulated industries (MedSecure, GovCloud Partners,
  DefenseLogic) who have similar network restrictions. FinanceFirst has
  escalated this to their VP of Engineering as a blocker for renewing their
  enterprise agreement next quarter.
