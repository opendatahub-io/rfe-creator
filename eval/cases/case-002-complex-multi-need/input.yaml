prompt: >
  We need to improve the model monitoring story in RHOAI. First, customers
  like NovaPharma and DataBridge want to set up automated alerts when model
  accuracy drifts below a threshold they define — today they have to manually
  check metrics dashboards every day, and they've missed degradation events
  that cost them revenue. Second, they need a way to compare model
  performance across versions side-by-side so they can decide whether to
  promote a new version to production. Third, compliance teams at NovaPharma
  require an audit trail of all model version promotions with timestamps and
  approver identity for SOX compliance. These are three distinct needs that
  came out of the Enterprise Advisory Board last quarter. NovaPharma has made
  this a condition for expanding from 50 to 200 seats ($600K upsell
  opportunity).
